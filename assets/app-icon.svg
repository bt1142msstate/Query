<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Space Library Query Icon</title>
  <desc id="desc">Miniature books orbiting a glowing knowledge planet, symbolizing library query indexing in a space theme.</desc>
  <defs>
    <!-- Deep Space Background Gradient -->
    <linearGradient id="bgSpace" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07050f"/>
      <stop offset="50%" stop-color="#0f0c20"/>
      <stop offset="100%" stop-color="#1b1235"/>
    </linearGradient>

    <!-- Planet 3D Spherical/Radial Gradient -->
    <radialGradient id="planetGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#a5f3fc"/> <!-- bright cyan highlight -->
      <stop offset="40%" stop-color="#06b6d4"/> <!-- cyan body -->
      <stop offset="75%" stop-color="#0891b2"/> <!-- darker cyan shadow -->
      <stop offset="100%" stop-color="#0f172a"/> <!-- shadow depth -->
    </radialGradient>

    <!-- Glow Filter for Planet -->
    <filter id="planetGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
    </filter>

    <!-- Clip Path for Planet Grid Lines -->
    <clipPath id="planetClip">
      <circle cx="256" cy="256" r="90"/>
    </clipPath>

    <!-- Crimson Book Gradient -->
    <linearGradient id="crimsonCover" x1="-32" y1="-13" x2="32" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>

    <!-- Gold Book Gradient -->
    <linearGradient id="goldCover" x1="-32" y1="-13" x2="32" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>

    <!-- Teal Book Gradient -->
    <linearGradient id="tealCover" x1="-32" y1="-13" x2="32" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>

    <!-- Book Pages Ivory/Parchment Gradient -->
    <linearGradient id="bookPages" x1="-30" y1="-15" x2="30" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fffdfa"/>
      <stop offset="100%" stop-color="#eaddca"/>
    </linearGradient>

    <!-- Soft Drop Shadow Filter for Books and Orbits -->
    <filter id="elementShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Card Background with rounded corners -->
  <rect id="app-background" width="512" height="512" rx="64" fill="url(#bgSpace)"/>

  <!-- Starfield (Background Layer) -->
  <g id="starfield">
    <!-- Fine star dots -->
    <circle cx="80" cy="100" r="1.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="120" cy="380" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="420" cy="120" r="1.5" fill="#a5f3fc" opacity="0.9"/>
    <circle cx="450" cy="400" r="2.5" fill="#ffffff" opacity="0.5"/>
    <circle cx="200" cy="70" r="1.5" fill="#ffffff" opacity="0.4"/>
    <circle cx="350" cy="450" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="50" cy="280" r="2" fill="#a5f3fc" opacity="0.8"/>
    <circle cx="460" cy="250" r="1.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="150" cy="200" r="1" fill="#ffffff" opacity="0.5"/>
    <circle cx="320" cy="100" r="2.5" fill="#ffffff" opacity="0.4"/>
    <circle cx="280" cy="380" r="1.5" fill="#a5f3fc" opacity="0.8"/>
    <circle cx="90" cy="460" r="2" fill="#ffffff" opacity="0.5"/>

    <!-- Large Twinkling Stars (4-point polygons) -->
    <!-- Twinkle 1 (Top-Right) -->
    <polygon points="380,65 383,75 393,78 383,81 380,91 377,81 367,78 377,75" fill="#ffffff" opacity="0.9"/>
    <circle cx="380" cy="78" r="4" fill="#a5f3fc" opacity="0.4" filter="url(#planetGlow)"/> <!-- simple small glow -->
    <!-- Twinkle 2 (Left) -->
    <polygon points="90,210 93,220 103,223 93,226 90,236 87,226 77,223 87,220" fill="#ffffff" opacity="0.85"/>
    <!-- Twinkle 3 (Bottom-Right) -->
    <polygon points="410,330 412,337 419,339 412,341 410,348 408,341 401,339 408,337" fill="#ffffff" opacity="0.75"/>
  </g>

  <!-- Planet Glow -->
  <circle id="planet-glow" cx="256" cy="256" r="95" fill="#06b6d4" opacity="0.3" filter="url(#planetGlow)"/>

  <!-- Planet Body -->
  <circle id="planet-body" cx="256" cy="256" r="90" fill="url(#planetGrad)"/>

  <!-- Planet Grid Lines (Clipped to Circle) -->
  <g id="planet-grid" clip-path="url(#planetClip)">
    <!-- Equators / Horizontal Latitude Arcs -->
    <line x1="160" y1="256" x2="352" y2="256" stroke="#ffffff" stroke-width="2.5" opacity="0.25"/>
    <path d="M 166 210 Q 256 235 346 210" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
    <path d="M 166 302 Q 256 277 346 302" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
    <!-- Prime Meridian / Vertical Longitude Arcs -->
    <line x1="256" y1="160" x2="256" y2="352" stroke="#ffffff" stroke-width="2.5" opacity="0.25"/>
    <path d="M 210 166 Q 235 256 210 346" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
    <path d="M 302 166 Q 277 256 302 346" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  </g>

  <!-- Planet Highlight Overlay (Adds glass/sphere shine) -->
  <path id="planet-highlight" d="M 176 200 A 80 80 0 0 1 336 200" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.25"/>

  <!-- Orbital Rings -->
  <g id="orbital-tracks">
    <!-- Orbit 1 (Rotated -30 deg) -->
    <ellipse cx="256" cy="256" rx="175" ry="75" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6, 8" transform="rotate(-30, 256, 256)" opacity="0.4"/>
    <!-- Orbit 2 (Rotated 15 deg) -->
    <ellipse cx="256" cy="256" rx="195" ry="85" fill="none" stroke="#a5f3fc" stroke-width="2" stroke-dasharray="6, 8" transform="rotate(15, 256, 256)" opacity="0.35"/>
    <!-- Orbit 3 (Rotated 65 deg) -->
    <ellipse cx="256" cy="256" rx="160" ry="70" fill="none" stroke="#67e8f9" stroke-width="1.5" stroke-dasharray="5, 7" transform="rotate(65, 256, 256)" opacity="0.3"/>
  </g>

  <!-- Orbiting Books -->
  <g id="orbiting-books" filter="url(#elementShadow)">
    
    <!-- Book 1 (Top-Left, Crimson Cover) -->
    <g id="book-crimson" transform="translate(130, 150) rotate(-20)">
      <!-- Cover -->
      <path d="M -32 -13 C -17 -18 -12 -13 -1 0 L -1 24 C -12 11 -17 6 -32 12 Z" fill="url(#crimsonCover)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      <path d="M 32 -13 C 17 -18 12 -13 1 0 L 1 24 C 12 11 17 6 32 12 Z" fill="url(#crimsonCover)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      
      <!-- Pages -->
      <path d="M -30 -15 C -15 -20 -10 -15 0 -5 L 0 20 C -10 10 -15 5 -30 10 Z" fill="url(#bookPages)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      <path d="M 30 -15 C 15 -20 10 -15 0 -5 L 0 20 C 10 10 15 5 30 10 Z" fill="url(#bookPages)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      
      <!-- Spine Lines & Book Lines -->
      <path d="M 0 -3 L 0 22" fill="none" stroke="#2a2018" stroke-width="3" stroke-linecap="round"/>
      <path d="M -22 -7 C -15 -9 -10 -6 -4 -2" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M -22 1 C -15 -1 -10 2 -4 6" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M 22 -7 C 15 -9 10 -6 4 -2" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M 22 1 C 15 -1 10 2 4 6" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- Book 2 (Middle-Right, Gold Cover) -->
    <g id="book-gold" transform="translate(380, 220) rotate(15)">
      <!-- Cover -->
      <path d="M -32 -13 C -17 -18 -12 -13 -1 0 L -1 24 C -12 11 -17 6 -32 12 Z" fill="url(#goldCover)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      <path d="M 32 -13 C 17 -18 12 -13 1 0 L 1 24 C 12 11 17 6 32 12 Z" fill="url(#goldCover)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      
      <!-- Pages -->
      <path d="M -30 -15 C -15 -20 -10 -15 0 -5 L 0 20 C -10 10 -15 5 -30 10 Z" fill="url(#bookPages)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      <path d="M 30 -15 C 15 -20 10 -15 0 -5 L 0 20 C 10 10 15 5 30 10 Z" fill="url(#bookPages)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      
      <!-- Spine Lines & Book Lines -->
      <path d="M 0 -3 L 0 22" fill="none" stroke="#2a2018" stroke-width="3" stroke-linecap="round"/>
      <path d="M -22 -7 C -15 -9 -10 -6 -4 -2" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M -22 1 C -15 -1 -10 2 -4 6" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M 22 -7 C 15 -9 10 -6 4 -2" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M 22 1 C 15 -1 10 2 4 6" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- Book 3 (Bottom-Left, Teal Cover) -->
    <g id="book-teal" transform="translate(210, 380) rotate(-40)">
      <!-- Cover -->
      <path d="M -32 -13 C -17 -18 -12 -13 -1 0 L -1 24 C -12 11 -17 6 -32 12 Z" fill="url(#tealCover)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      <path d="M 32 -13 C 17 -18 12 -13 1 0 L 1 24 C 12 11 17 6 32 12 Z" fill="url(#tealCover)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      
      <!-- Pages -->
      <path d="M -30 -15 C -15 -20 -10 -15 0 -5 L 0 20 C -10 10 -15 5 -30 10 Z" fill="url(#bookPages)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      <path d="M 30 -15 C 15 -20 10 -15 0 -5 L 0 20 C 10 10 15 5 30 10 Z" fill="url(#bookPages)" stroke="#2a2018" stroke-width="4" stroke-linejoin="round"/>
      
      <!-- Spine Lines & Book Lines -->
      <path d="M 0 -3 L 0 22" fill="none" stroke="#2a2018" stroke-width="3" stroke-linecap="round"/>
      <path d="M -22 -7 C -15 -9 -10 -6 -4 -2" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M -22 1 C -15 -1 -10 2 -4 6" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M 22 -7 C 15 -9 10 -6 4 -2" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M 22 1 C 15 -1 10 2 4 6" fill="none" stroke="#2a2018" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    </g>
  </g>
</svg>
